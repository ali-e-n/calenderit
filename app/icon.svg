<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1c1710"/>
      <stop offset="100%" stop-color="#0D0D0D"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" fill="url(#bg)"/>

  <!-- Gold border -->
  <rect x="4" y="4" width="92" height="92" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
  <!-- Inner border -->
  <rect x="7" y="7" width="86" height="86" fill="none" stroke="#C9A84C" stroke-width="0.4" opacity="0.2"/>

  <!-- Y letterform with serifs -->
  <g fill="none" stroke="#C9A84C">
    <!-- Left arm -->
    <line x1="21" y1="22" x2="50" y2="53" stroke-width="4.5" stroke-linecap="butt"/>
    <!-- Right arm -->
    <line x1="79" y1="22" x2="50" y2="53" stroke-width="4.5" stroke-linecap="butt"/>
    <!-- Stem -->
    <line x1="50" y1="53" x2="50" y2="81" stroke-width="4.5" stroke-linecap="butt"/>

    <!-- Top-left serif -->
    <line x1="12" y1="22" x2="30" y2="22" stroke-width="2.5" stroke-linecap="butt"/>
    <!-- Top-right serif -->
    <line x1="70" y1="22" x2="88" y2="22" stroke-width="2.5" stroke-linecap="butt"/>
    <!-- Bottom serif -->
    <line x1="42" y1="81" x2="58" y2="81" stroke-width="2.5" stroke-linecap="butt"/>
  </g>

  <!-- Tiny gold dot at arm junction -->
  <circle cx="50" cy="53" r="2.5" fill="#C9A84C"/>
</svg>
